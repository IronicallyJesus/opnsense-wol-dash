<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPNsense WOL (DEV MOCK)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .dev-strip { background: repeating-linear-gradient(45deg, #f59e0b, #f59e0b 10px, #b45309 10px, #b45309 20px); }
        .toast-enter { opacity: 0; transform: translateX(-50%) translateY(20px); }
        .toast-visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 relative bg-slate-900">
    
    <!-- Dev Banner -->
    <div class="fixed top-0 left-0 w-full h-2 dev-strip z-50"></div>
    <div class="fixed top-2 right-2 bg-amber-600 text-white text-xs font-bold px-2 py-1 rounded shadow">MOCK MODE</div>

    <div class="w-full max-w-6xl mt-4 pb-20">
        <header class="flex justify-between items-center mb-10 px-2">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span class="bg-sky-500/10 text-sky-400 p-2 rounded-xl border border-sky-500/20"><i class="ph ph-lightning"></i></span>
                    Network Wake
                </h1>
                <p class="text-slate-400 text-sm mt-2 ml-1">Dashboard</p>
            </div>
            <button onclick="loadHosts()" class="p-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-sky-400 transition-colors border border-slate-700 shadow-lg">
                <i class="ph ph-arrow-clockwise text-xl" id="refresh-icon"></i>
            </button>
        </header>

        <div id="host-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Content injected here -->
        </div>
    </div>

    <!-- Floating Toast Notification -->
    <div id="status-msg" class="fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none"></div>

    <script>
        // --- MOCK DATA ---
        // Using raw OPNsense interface IDs (lan, optX)
        const MOCK_DATA = [
            { uuid: '101', descr: 'TrueNAS Core', mac: '00:1B:21:44:55:66', interface: 'opt1' },
            { uuid: '102', descr: 'Plex Server', mac: 'AA:BB:CC:DD:EE:01', interface: 'lan' },
            { uuid: '103', descr: 'Gaming Rig', mac: '12:34:56:78:90:AB', interface: 'lan' },
            { uuid: '104', descr: 'Basement Printer', mac: '98:76:54:32:10:FF', interface: 'opt2' },
            { uuid: '105', descr: 'NVIDIA Shield', mac: '11:22:33:44:55:66', interface: 'opt2' },
            { uuid: '106', descr: 'Backup Pi', mac: 'B8:27:EB:00:00:01', interface: 'opt5' }
        ];

        const grid = document.getElementById('host-grid');
        const statusMsg = document.getElementById('status-msg');
        const refreshIcon = document.getElementById('refresh-icon');

        function loadHosts() {
            refreshIcon.classList.add('spin');
            grid.style.opacity = '0.5';
            
            setTimeout(() => {
                renderHosts(MOCK_DATA);
                refreshIcon.classList.remove('spin');
                grid.style.opacity = '1';
            }, 800);
        }

        function renderHosts(hosts) {
            grid.innerHTML = hosts.map(host => `
                <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-xl flex flex-col gap-5 hover:border-slate-600 transition-colors">
                    
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-slate-700/50 rounded-xl text-sky-400 border border-slate-600/50 shrink-0">
                            <i class="ph ph-desktop-tower text-2xl"></i>
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <h3 class="font-bold text-lg text-white truncate leading-tight" title="${host.descr}">${host.descr}</h3>
                            <div class="flex items-center gap-1.5 text-xs font-medium text-slate-400 mt-0.5">
                                <i class="ph ph-network-slash text-sky-500"></i>
                                <span class="uppercase tracking-wider font-bold text-slate-500">${host.interface || 'UNKNOWN'}</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-900/80 rounded-lg p-3 border border-slate-700/50 flex flex-col gap-1.5 shadow-inner">
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-slate-500 font-medium">MAC</span>
                            <span class="font-mono text-slate-300 tracking-wide select-all">${host.mac}</span>
                        </div>
                    </div>

                    <button onclick="wakeHost('${host.uuid}', '${host.descr}')" 
                        class="mt-auto w-full bg-sky-600 hover:bg-sky-500 active:bg-sky-400 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-sky-900/20 hover:shadow-sky-500/20 transition-all flex items-center justify-center gap-2 group transform active:scale-[0.98]">
                        <i class="ph ph-power text-lg font-bold"></i>
                        <span>Wake Host</span>
                    </button>

                </div>
            `).join('');
        }

        function wakeHost(uuid, name) {
            showStatus(`Sending wake signal to ${name}...`, 'info');
            setTimeout(() => {
                const success = Math.random() > 0.1;
                if (success) {
                    showStatus(`${name} signal sent successfully!`, 'success');
                } else {
                    showStatus(`Failed to contact ${name}`, 'error');
                }
            }, 600);
        }

        let toastTimeout;

        function showStatus(msg, type) {
            clearTimeout(toastTimeout);
            statusMsg.textContent = msg;
            
            const baseClasses = "fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-visible";
            const styles = {
                'success': 'bg-emerald-900/90 text-emerald-300 border-emerald-500/50 shadow-emerald-900/40',
                'error': 'bg-red-900/90 text-red-300 border-red-500/50 shadow-red-900/40',
                'info': 'bg-slate-800/90 text-sky-300 border-sky-500/50 shadow-sky-900/40'
            };
            
            statusMsg.className = `${baseClasses} ${styles[type] || styles.info}`;
            
            toastTimeout = setTimeout(() => {
                statusMsg.className = "fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none";
            }, 3000);
        }

        loadHosts();
    </script>
</body>
</html>
