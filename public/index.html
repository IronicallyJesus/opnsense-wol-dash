<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPNsense WOL</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='1' y='1' width='22' height='22' rx='6' ry='6' fill='%231e293b'/%3E%3Cpath d='M12 3v8' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3Cpath d='M17.66 7.34a9 9 0 1 1-11.32 0' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/custom.css">
</head>
<body class="app-wrapper">

    <main class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <h1>Network Wake</h1>
                <p>Dashboard</p>
            </div>

            <div class="header-controls">
                <!-- Theme Selector -->
                <div class="theme-select-wrap">
                    <select id="theme-select" class="theme-select" onchange="setTheme(this.value)">
                        <option value="slate">Slate Dark</option>
                        <option value="emerald">Emerald Dark</option>
                        <option value="violet">Violet Dark</option>
                        <option value="rose">Rose Dark</option>
                        <option value="light">Light</option>
                    </select>
                    <svg class="theme-select-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M3.5 5.25l3.5 3.5 3.5-3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- View Toggle -->
                <div class="view-toggle" id="view-toggle">
                    <button data-view="grid" class="active" onclick="setView('grid')" title="Card grid view">Grid</button>
                    <button data-view="table" onclick="setView('table')" title="Compact table view">Table</button>
                </div>

                <!-- Wake All Button -->
                <button id="wake-all-btn" onclick="wakeAll()" class="btn-wake-all">
                    <span>Wake All</span>
                </button>

                <!-- Schedule Button + Refresh (same row on mobile) -->
                <div class="action-row">
                    <button onclick="openSchedulesModal()" class="btn-icon" title="Scheduled wakes">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </button>

                    <!-- Refresh Button -->
                    <button onclick="loadHosts()" class="btn-icon btn-icon-refresh" title="Refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Last Updated + Auto-Refresh indicator -->
        <div class="status-bar">
            <p class="status-bar-text" id="last-updated"></p>
            <p class="status-indicator" id="status-indicator">
                <span class="status-dot status-dot-offline" id="indicator-dot"></span>
                <span id="indicator-text">status idle</span>
            </p>
        </div>

        <!-- Host Container -->
        <div id="host-grid" class="host-grid">
            <!-- Skeleton loading state (JS replaces this) -->
            <div class="loading-state" id="loading-state">
                <p>Loading...</p>
            </div>
        </div>
    </main>

    <!-- ── Schedules Modal ── -->
    <div id="schedules-modal" class="modal-overlay" onclick="if(event.target===this)closeSchedulesModal()">
        <div class="modal-panel">
            <!-- Header -->
            <div class="modal-header">
                <h2>Scheduled Wakes</h2>
                <button onclick="closeSchedulesModal()" class="modal-close">&times;</button>
            </div>

            <!-- Schedule List -->
            <div class="modal-body">
                <div id="schedule-list" class="modal-schedule-list">
                    <div class="empty-schedules">No schedules yet.</div>
                </div>
            </div>

            <!-- Add Form -->
            <div class="modal-form">
                <div class="sched-form-row">
                    <select id="sched-host" class="form-select">
                        <option value="">Select host...</option>
                    </select>
                    <div class="sched-form-inline">
                        <input id="sched-time" type="time" value="09:00" class="form-input">
                        <button onclick="addSchedule()" class="btn-add-sched">Add</button>
                    </div>
                </div>
                <div class="sched-days-row">
                    <span class="sched-days-label">Days:</span>
                    <div class="day-checkboxes" id="sched-days">
                        <label><input type="checkbox" value="1" checked>M</label>
                        <label><input type="checkbox" value="2" checked>T</label>
                        <label><input type="checkbox" value="3" checked>W</label>
                        <label><input type="checkbox" value="4" checked>T</label>
                        <label><input type="checkbox" value="5" checked>F</label>
                        <label><input type="checkbox" value="6">S</label>
                        <label><input type="checkbox" value="0">S</label>
                    </div>
                    <div class="sched-form-inline">
                        <button id="sched-quick-daily" onclick="setSchedDays('daily')" class="sched-quick-btn">Daily</button>
                        <button id="sched-quick-weekdays" onclick="setSchedDays('weekdays')" class="sched-quick-btn active">Weekdays</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Toast -->
    <div id="status-msg" class="toast toast-hidden"></div>

    <script>
        // ── State ──
        const grid = document.getElementById('host-grid');
        const statusMsg = document.getElementById('status-msg');
        let hosts = [];
        let rttData = {};       // { uuid: rtt_ms }
        let refreshInterval = null;

        // ── View Mode ──
        function getView() { return localStorage.getItem('opnsense-wol-view') || 'grid'; }
        function setView(mode) {
            localStorage.setItem('opnsense-wol-view', mode);
            document.querySelectorAll('#view-toggle button').forEach(b => {
                b.classList.toggle('active', b.dataset.view === mode);
            });
            grid.classList.toggle('view-table', mode === 'table');
            if (hosts.length > 0) renderHosts();
        }

        // ── Theme ──
        function getTheme() { return localStorage.getItem('opnsense-wol-theme') || 'slate'; }
        function setTheme(name) {
            localStorage.setItem('opnsense-wol-theme', name);
            document.documentElement.setAttribute('data-theme', name);
            document.getElementById('theme-select').value = name;
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.setAttribute('data-theme', getTheme());
            document.getElementById('theme-select').value = getTheme();
        });

        // ── Wake History ──
        function getWakeHistory() {
            try { return JSON.parse(localStorage.getItem('opnsense-wol-wake-history') || '{}'); }
            catch { return {}; }
        }
        function recordWake(uuid, descr) {
            const history = getWakeHistory();
            history[uuid] = { descr, time: Date.now() };
            localStorage.setItem('opnsense-wol-wake-history', JSON.stringify(history));
        }
        function getLastWake(uuid) {
            const history = getWakeHistory();
            const entry = history[uuid];
            if (!entry) return null;
            const delta = Date.now() - entry.time;
            if (delta < 60000) return '<1m ago';
            if (delta < 3600000) return `${Math.floor(delta / 60000)}m ago`;
            if (delta < 86400000) return `${Math.floor(delta / 3600000)}h ago`;
            return `${Math.floor(delta / 86400000)}d ago`;
        }

        // ── Sanitize ──
        function esc(text) {
            if (text == null) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ── RTT Color ──
        function rttColor(rtt) {
            if (rtt === null || rtt === undefined) return 'rtt-none';
            if (rtt < 50) return 'rtt-low';
            if (rtt < 150) return 'rtt-mid';
            return 'rtt-high';
        }

        // ── Load Hosts ──
        async function loadHosts() {
            grid.style.opacity = '0.6';

            try {
                const res = await fetch('/api/hosts');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                hosts = await res.json();

                const now = new Date();
                document.getElementById('last-updated').textContent =
                    `Updated ${now.toLocaleTimeString()}`;

                // Status is embedded in /api/hosts — map to _online for render
                for (const host of hosts) {
                    host._online = host.online === true ? true : (host.online === false ? false : null);
                }

                // Update status indicator
                const onlineCount = hosts.filter(h => h._online === true).length;
                const totalKnown = hosts.filter(h => h._online !== null).length;
                const indicator = document.getElementById('status-indicator');
                const dot = document.getElementById('indicator-dot');
                const text = document.getElementById('indicator-text');
                if (totalKnown > 0) {
                    dot.className = 'status-dot' + (onlineCount > 0 ? ' status-dot-online' : ' status-dot-offline');
                    if (onlineCount > 0) dot.classList.add('status-online');
                    text.textContent = `${onlineCount}/${totalKnown} online`;
                }
                renderHosts();
                pingHosts();
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="error-state">
                    <p>Connection Failed</p>
                    <p>Could not reach OPNsense API.</p>
                </div>`;
            } finally {
                grid.style.opacity = '1';
            }
        }

        function renderHosts() {
            if (!Array.isArray(hosts) || hosts.length === 0) {
                grid.innerHTML = `<div class="empty-state">No WOL hosts configured in OPNsense.</div>`;
                return;
            }

            // Route to table view when active
            const view = getView();
            if (view === 'table') {
                renderTable();
                return;
            }

            // Sort: online first, then unknown, then offline
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            grid.innerHTML = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const ip = esc(host.ip || '');
                const uuid = esc(host.uuid);
                const lastWake = getLastWake(uuid);

                // Status dot
                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="status-dot-card status-online" style="background: var(--online)" title="Online"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="status-dot-card" style="background: var(--offline)" title="Offline"></span>`;
                }

                return `
                <div class="host-card fade-in">

                    <!-- Header -->
                    <div class="host-card-header">
                        <div class="host-card-name-wrap">
                            <div class="host-card-name-line">
                                ${statusDot}
                                <h3 class="host-card-name" title="${descr}">${descr}</h3>
                            </div>
                            <div class="host-card-meta">
                                <span class="iface-tag">${iface}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Details -->
                    <div class="host-details">
                        <div class="detail-row">
                            <span class="detail-label">MAC</span>
                            <span class="detail-value detail-value-mono">${mac}</span>
                        </div>
                        ${ip ? `<div class="detail-row">
                            <span class="detail-label">IP</span>
                            <span class="detail-value">${ip}</span>
                        </div>` : ''}
                        <div class="detail-row">
                            <span class="detail-label">Latency</span>
                            <span class="rtt-badge ${host._online ? '' : 'rtt-none'}" data-uuid="${uuid}">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span>
                        </div>
                        ${lastWake ? `
                        <div class="detail-row">
                            <span class="detail-label">Last Wake</span>
                            <span class="detail-value">${lastWake}</span>
                        </div>` : ''}
                    </div>

                    <!-- Wake Button -->
                    <button data-uuid="${uuid}" data-descr="${descr}" class="btn-wake-card">
                        <span>Wake Host</span>
                    </button>
                </div>
            `}).join('');
        }

        // ── Ping Hosts ──
        async function pingHosts() {
            const onlineHosts = hosts.filter(h => h._online === true && h.ip);
            if (onlineHosts.length === 0) return;

            for (const host of onlineHosts) {
                try {
                    const res = await fetch(`/api/ping/${host.uuid}`);
                    const data = await res.json();
                    if (data.rtt !== undefined) {
                        rttData[host.uuid] = data.rtt;
                    }
                    if (data.unreachable) {
                        rttData[host.uuid + '_unreachable'] = true;
                    }
                } catch {
                    // silent — ping is best-effort
                }
            }

            // Update DOM with RTTs
            for (const [uuid, rtt] of Object.entries(rttData)) {
                if (uuid.endsWith('_unreachable')) continue;
                const label = rtt === null
                    ? (rttData[uuid + '_unreachable'] ? 'blocked' : '—')
                    : `${rtt}ms`;
                // Card view: find the .rtt-badge element
                const cardBadge = document.querySelector(`.rtt-badge[data-uuid="${uuid}"]`);
                if (cardBadge) {
                    cardBadge.textContent = label;
                    cardBadge.className = `rtt-badge ${rttColor(rtt)}`;
                }
                // Table view: find the .ping-cell element
                const td = document.querySelector(`.ping-cell[data-uuid="${uuid}"]`);
                if (td) {
                    td.textContent = label;
                    td.className = `ping-cell ${rttColor(rtt)}`;
                }
            }
        }

        // ── Render Table ──
        function renderTable() {
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            const rows = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const uuid = esc(host.uuid);
                const ip = esc(host.ip || '');
                const lastWake = getLastWake(uuid);

                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="status-dot-card status-online" style="background: var(--online)"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="status-dot-card" style="background: var(--offline)"></span>`;
                }

                return `<tr>
                    <td><div style="display:flex;align-items:center;gap:0.5rem">${statusDot}<span class="td-name">${descr}</span></div></td>
                    <td><span class="td-iface">${iface}</span></td>
                    <td><span class="td-mac">${mac}</span></td>
                    ${ip ? `<td class="td-ip">${ip}</td>` : '<td></td>'}
                    <td><span class="ping-cell ${host._online ? '' : 'rtt-none'}" data-uuid="${uuid}">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span></td>
                    <td class="td-lastwake">${lastWake || '—'}</td>
                    <td class="td-wake">
                        <button data-uuid="${uuid}" data-descr="${descr}" class="btn-wake-table">Wake</button>
                    </td>
                </tr>`;
            }).join('');

            grid.innerHTML = `
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Host</th>
                                <th>Interface</th>
                                <th>MAC</th>
                                <th>IP</th>
                                <th>Latency</th>
                                <th>Last Wake</th>
                                <th class="td-wake">Action</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        // ── Wake All Hosts ──
        async function wakeAll() {
            const btn = document.getElementById('wake-all-btn');
            const span = btn.querySelector('span');
            const origText = span.textContent;
            btn.disabled = true;
            span.textContent = 'Waking...';

            try {
                const res = await fetch('/api/wake-all', { method: 'POST' });
                const data = await res.json();
                if (res.ok && data.status === 'OK') {
                    // Record wake for all hosts
                    for (const host of hosts) {
                        recordWake(host.uuid, host.descr || 'Unknown');
                    }
                    showToast(`Wake signals sent to ${data.count} hosts!`, 'success');
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast('Failed to send wake signals.', 'error');
                }
            } catch {
                showToast('Network error. Try again.', 'error');
            } finally {
                btn.disabled = false;
                span.textContent = origText;
            }
        }

        // ── Wake Host ──
        grid.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-uuid]');
            if (btn) wakeHost(btn.dataset.uuid, btn.dataset.descr);
        });

        async function wakeHost(uuid, name) {
            showToast(`Sending wake signal to ${name}...`, 'info');
            try {
                const res = await fetch(`/api/wake/${uuid}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok && (data.status === 'OK' || data.result === 'OK')) {
                    recordWake(uuid, name);
                    showToast(`${name} — signal sent!`, 'success');
                    // Re-render to update Last Wake
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast(`Failed to wake ${name}.`, 'error');
                }
            } catch {
                showToast(`Network error waking ${name}.`, 'error');
            }
        }

        // ── Toast ──
        let toastTimer;
        function showToast(msg, type) {
            clearTimeout(toastTimer);
            statusMsg.textContent = msg;

            const colors = {
                success: { bg: 'var(--toast-success)', text: '#6ee7b7', border: 'rgba(52, 211, 153, 0.4)' },
                error:   { bg: 'var(--toast-error)',   text: '#fca5a5', border: 'rgba(239, 68, 68, 0.4)' },
                info:    { bg: 'var(--toast-info)',    text: '#7dd3fc', border: 'rgba(14, 165, 233, 0.4)' }
            };
            const c = colors[type] || colors.info;

            statusMsg.className = 'toast toast-visible';
            Object.assign(statusMsg.style, {
                background: c.bg, color: c.text, borderColor: c.border
            });

            toastTimer = setTimeout(() => {
                statusMsg.className = 'toast toast-hidden';
                statusMsg.style.background = '';
                statusMsg.style.color = '';
                statusMsg.style.borderColor = '';
            }, 3500);
        }

        // ── Schedule Management ──
        let schedules = [];

        async function loadSchedules() {
            try {
                const res = await fetch('/api/schedules');
                schedules = await res.json();
                renderSchedules();
            } catch { /* ignore */ }
        }

        function daysLabel(days) {
            if (!days || days.length === 0) return 'Daily';
            const names = {0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
            const isWeekdays = days.length === 5 && [1,2,3,4,5].every(d => days.includes(d));
            if (isWeekdays) return 'Weekdays';
            return days.map(d => names[d] || d).join(', ');
        }

        function timeLabel(t) {
            const [h, m] = t.split(':').map(Number);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
        }

        function renderSchedules() {
            const list = document.getElementById('schedule-list');
            if (!schedules.length) {
                list.innerHTML = '<div class="empty-schedules">No schedules yet. Add one below.</div>';
                return;
            }
            list.innerHTML = schedules.map(s => {
                const isOn = s.enabled !== false;
                return `<div class="schedule-item" data-id="${esc(s.id)}">
                    <div class="sched-info">
                        <div class="sched-host">${esc(s.hostLabel || s.hostUuid)}</div>
                        <div class="sched-detail">${timeLabel(s.time)} &middot; ${daysLabel(s.days)}</div>
                        ${s.lastFired ? `<div class="sched-last">Last fired ${new Date(s.lastFired).toLocaleString()}</div>` : ''}
                    </div>
                    <button class="sched-toggle ${isOn ? 'on' : 'off'}" onclick="toggleSchedule('${esc(s.id)}', ${!isOn})" title="${isOn ? 'Disable' : 'Enable'}"></button>
                    <button class="sched-del" onclick="deleteSchedule('${esc(s.id)}')" title="Delete schedule">&times;</button>
                </div>`;
            }).join('');
        }

        async function addSchedule() {
            const select = document.getElementById('sched-host');
            const hostUuid = select.value;
            const time = document.getElementById('sched-time').value;
            if (!hostUuid || !time) { showToast('Select a host and time.', 'info'); return; }

            // Get host label
            const host = hosts.find(h => h.uuid === hostUuid);
            const hostLabel = host ? (host.descr || host.hostname || 'Unknown') : 'Unknown';

            // Get selected days
            const dayChecks = document.querySelectorAll('#sched-days input[type="checkbox"]:checked');
            const days = Array.from(dayChecks).map(c => parseInt(c.value));
            // If all 7 checked, set to empty for "Daily"
            const finalDays = days.length === 7 ? [] : days;

            try {
                const res = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ hostUuid, hostLabel, time, days: finalDays, label: '' })
                });
                if (res.ok) {
                    await loadSchedules();
                    showToast(`Schedule added for ${hostLabel}.`, 'success');
                } else {
                    showToast('Failed to add schedule.', 'error');
                }
            } catch { showToast('Network error.', 'error'); }
        }

        async function toggleSchedule(id, enable) {
            try {
                await fetch(`/api/schedules/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ enabled: enable })
                });
                await loadSchedules();
            } catch { /* ignore */ }
        }

        async function deleteSchedule(id) {
            try {
                await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
                await loadSchedules();
            } catch { /* ignore */ }
        }

        function setSchedDays(mode) {
            const checks = document.querySelectorAll('#sched-days input[type="checkbox"]');
            const quickBtns = [document.getElementById('sched-quick-daily'), document.getElementById('sched-quick-weekdays')];
            quickBtns.forEach(b => { b.className = 'sched-quick-btn'; });
            if (mode === 'daily') {
                checks.forEach(c => c.checked = true);
                document.getElementById('sched-quick-daily').classList.add('active');
            } else {
                checks.forEach(c => c.checked = [1,2,3,4,5].includes(parseInt(c.value)));
                document.getElementById('sched-quick-weekdays').classList.add('active');
            }
        }

        function openSchedulesModal() {
            // Populate host dropdown
            const select = document.getElementById('sched-host');
            select.innerHTML = '<option value="">Select host...</option>' +
                hosts.map(h => `<option value="${esc(h.uuid)}">${esc(h.descr || h.hostname || 'Unknown')}</option>`).join('');
            loadSchedules();
            document.getElementById('schedules-modal').classList.add('open');
        }

        function closeSchedulesModal() {
            document.getElementById('schedules-modal').classList.remove('open');
        }

        // ── Init ──
        setView(getView()); // Restore view mode from localStorage
        loadHosts();
        // Auto-refresh host list every 30s
        refreshInterval = setInterval(loadHosts, 30000);
    </script>
</body>
</html>
