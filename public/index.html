<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPNsense WOL v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── Theme System ── */
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-inner: #0f172a;
            --border: #334155;
            --border-hover: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-heading: #f8fafc;
            --accent: #0ea5e9;
            --accent-bg: rgba(14, 165, 233, 0.1);
            --accent-border: rgba(14, 165, 233, 0.2);
            --accent-hover: #0284c7;
            --icon-bg: rgba(51, 65, 85, 0.5);
            --icon-border: rgba(71, 85, 105, 0.5);
            --toast-success: rgba(6, 95, 70, 0.9);
            --toast-error: rgba(127, 29, 29, 0.9);
            --toast-info: rgba(30, 41, 59, 0.9);
            --online: #22c55e;
            --offline: #64748b;
            --header-bg: transparent;
        }

        [data-theme="emerald"] {
            --bg: #022c22;
            --bg-card: #064e3b;
            --bg-card-inner: #022c22;
            --border: #065f46;
            --border-hover: #047857;
            --text: #d1fae5;
            --text-muted: #6ee7b7;
            --text-heading: #ecfdf5;
            --accent: #10b981;
            --accent-bg: rgba(16, 185, 129, 0.1);
            --accent-border: rgba(16, 185, 129, 0.2);
            --accent-hover: #059669;
            --icon-bg: rgba(6, 78, 59, 0.5);
            --icon-border: rgba(4, 120, 87, 0.5);
            --online: #34d399;
            --offline: #6b7280;
        }

        [data-theme="violet"] {
            --bg: #1e1b4b;
            --bg-card: #312e81;
            --bg-card-inner: #1e1b4b;
            --border: #4338ca;
            --border-hover: #4f46e5;
            --text: #e0e7ff;
            --text-muted: #a5b4fc;
            --text-heading: #eef2ff;
            --accent: #818cf8;
            --accent-bg: rgba(99, 102, 241, 0.15);
            --accent-border: rgba(99, 102, 241, 0.25);
            --accent-hover: #6366f1;
            --icon-bg: rgba(49, 46, 129, 0.5);
            --icon-border: rgba(67, 56, 202, 0.5);
            --online: #a78bfa;
            --offline: #6b7280;
        }

        [data-theme="rose"] {
            --bg: #1c1917;
            --bg-card: #292524;
            --bg-card-inner: #1c1917;
            --border: #44403c;
            --border-hover: #57534e;
            --text: #fef2f2;
            --text-muted: #fecaca;
            --text-heading: #fff1f2;
            --accent: #f43f5e;
            --accent-bg: rgba(244, 63, 94, 0.1);
            --accent-border: rgba(244, 63, 94, 0.2);
            --accent-hover: #e11d48;
            --icon-bg: rgba(68, 64, 60, 0.5);
            --icon-border: rgba(87, 83, 78, 0.5);
            --online: #34d399;
            --offline: #6b7280;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-inner: #f1f5f9;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --text: #334155;
            --text-muted: #64748b;
            --text-heading: #0f172a;
            --accent: #0ea5e9;
            --accent-bg: rgba(14, 165, 233, 0.08);
            --accent-border: rgba(14, 165, 233, 0.15);
            --accent-hover: #0284c7;
            --icon-bg: #f1f5f9;
            --icon-border: #e2e8f0;
            --online: #16a34a;
            --offline: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
        }

        .toast-enter { opacity: 0; transform: translateX(-50%) translateY(20px); }
        .toast-visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Status pulse animation for online hosts */
        .status-online { animation: pulse-green 2s ease-in-out infinite; }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        /* ── Table View ── */
        .view-table.host-grid {
            display: block;
        }
        .view-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .view-table th {
            text-align: left;
            padding: 0.625rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .view-table th:hover { color: var(--text); }
        .view-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            vertical-align: middle;
        }
        .view-table tr:hover td {
            background: var(--bg-card-inner);
        }
        .view-table tr:last-child td { border-bottom: none; }
        .view-table .td-name {
            font-weight: 600;
            color: var(--text-heading);
        }
        .view-table .td-iface {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 0.03em;
        }
        .view-table .td-mac {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .view-table .td-wake {
            text-align: right;
        }
        .view-table .btn-wake-table {
            padding: 0.375rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .view-table .btn-wake-table:hover { background: var(--accent-hover); }
        .view-table .btn-wake-table:active { transform: scale(0.97); }

        /* View toggle button */
        .view-toggle {
            display: inline-flex;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }
        .view-toggle button {
            padding: 0.5rem 0.875rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
        }
        .view-toggle button.active {
            background: var(--accent);
            color: #fff;
        }
        .view-toggle button:not(.active):hover {
            color: var(--text);
            background: var(--bg-card-inner);
        }
        .view-toggle button:first-child { border-right: 1px solid var(--border); }

        /* ── Schedules Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-panel {
            width: 100%;
            max-width: 480px;
            margin: 0 1rem;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.open .modal-panel {
            transform: scale(1);
        }
        .schedule-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: var(--bg-card-inner);
            transition: border-color 0.15s;
        }
        .schedule-item:hover {
            border-color: var(--border-hover);
        }
        .schedule-item .sched-info {
            flex: 1;
            min-width: 0;
        }
        .schedule-item .sched-host {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-heading);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .schedule-item .sched-detail {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.125rem;
        }
        .schedule-item .sched-last {
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .sched-toggle {
            width: 2.25rem;
            height: 1.25rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
            margin: 0 0.5rem;
        }
        .sched-toggle::after {
            content: '';
            position: absolute;
            top: 0.125rem;
            left: 0.125rem;
            width: 1rem;
            height: 1rem;
            border-radius: 999px;
            background: #fff;
            transition: transform 0.2s;
        }
        .sched-toggle.on { background: var(--accent); }
        .sched-toggle.on::after { transform: translateX(1rem); }
        .sched-toggle.off { background: #475569; }
        .sched-toggle.off::after { transform: translateX(0); }
        .sched-del {
            padding: 0.375rem 0.625rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .sched-del:hover {
            color: #fca5a5;
            border-color: rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.1);
        }
        .day-checkboxes {
            display: flex;
            gap: 0.25rem;
        }
        .day-checkboxes label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.125rem;
            font-size: 0.65rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .day-checkboxes input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.375rem;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .empty-schedules {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-6xl mt-4 pb-20">
        <!-- Header -->
        <header class="flex flex-wrap justify-between items-center gap-4 mb-10 px-2">
            <div>
                <h1 class="text-3xl font-bold" style="color: var(--text-heading)">Network Wake</h1>
                <p class="text-sm mt-2 ml-1" style="color: var(--text-muted)">Dashboard <span id="version-tag" class="text-xs opacity-60">v3</span></p>
            </div>

            <div class="flex flex-wrap items-center gap-3 justify-end">
                <!-- Theme Selector -->
                <div class="relative">
                    <select id="theme-select"
                        class="appearance-none py-2.5 pl-4 pr-10 rounded-xl text-sm font-medium cursor-pointer transition-colors"
                        style="background: var(--bg-card); color: var(--text); border: 1px solid var(--border);"
                        onchange="setTheme(this.value)">
                        <option value="slate">Slate Dark</option>
                        <option value="emerald">Emerald Dark</option>
                        <option value="violet">Violet Dark</option>
                        <option value="rose">Rose Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>

                <!-- View Toggle -->
                <div class="view-toggle" id="view-toggle">
                    <button data-view="grid" class="active" onclick="setView('grid')" title="Card grid view">Grid</button>
                    <button data-view="table" onclick="setView('table')" title="Compact table view">Table</button>
                </div>

                <!-- Wake All Button -->
                <button id="wake-all-btn" onclick="wakeAll()" class="py-2.5 px-5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg transform active:scale-[0.98]"
                    style="background: var(--accent); color: #fff;">
                    <span>Wake All</span>
                </button>

                <!-- Schedule Button -->
                <button onclick="openSchedulesModal()" class="p-3 rounded-xl transition-colors border shadow-lg" title="Scheduled wakes"
                    style="background: var(--bg-card); color: var(--text-muted); border-color: var(--border);">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>

                <!-- Refresh Button -->
                <button onclick="loadHosts()" class="p-3 rounded-xl transition-colors border shadow-lg"
                    style="background: var(--bg-card); color: var(--accent); border-color: var(--border);">
                    Refresh
                </button>
            </div>
        </header>

        <!-- Last Updated + Auto-Refresh indicator -->
        <div class="flex items-center justify-between px-2 mb-6">
            <p class="text-xs" style="color: var(--text-muted)" id="last-updated"></p>
            <p class="text-xs flex items-center gap-1" style="color: var(--text-muted)" id="status-indicator">
                <span class="w-2 h-2 rounded-full" style="background: var(--offline)"></span>
                status idle
            </p>
        </div>

        <!-- Host Container -->
        <div id="host-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 host-grid">
            <div class="col-span-1 md:col-span-2 lg:col-span-3 flex justify-center py-20" style="color: var(--text-muted)">
                Loading...
            </div>
        </div>
    </div>

    <!-- ── Schedules Modal ── -->
    <div id="schedules-modal" class="modal-overlay" onclick="if(event.target===this)closeSchedulesModal()">
        <div class="modal-panel">
            <!-- Header -->
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold" style="color: var(--text-heading)">Scheduled Wakes</h2>
                <button onclick="closeSchedulesModal()" class="p-1.5 rounded-lg transition-colors" style="color: var(--text-muted)" onmouseenter="this.style.background='var(--bg-card-inner)'" onmouseleave="this.style.background='transparent'">&times;</button>
            </div>

            <!-- Schedule List -->
            <div id="schedule-list" class="flex flex-col gap-2 overflow-y-auto flex-1 min-h-0 mb-4">
                <div class="empty-schedules">No schedules yet.</div>
            </div>

            <!-- Add Form -->
            <div class="border-t pt-4 flex flex-col gap-3" style="border-color: var(--border)">
                <div class="flex flex-wrap gap-2 items-end">
                    <select id="sched-host" class="flex-1 min-w-[120px] py-2 px-3 rounded-xl text-sm border" style="background: var(--bg-card-inner); color: var(--text); border-color: var(--border);">
                        <option value="">Select host...</option>
                    </select>
                    <input id="sched-time" type="time" value="09:00" class="py-2 px-3 rounded-xl text-sm border" style="background: var(--bg-card-inner); color: var(--text); border-color: var(--border);">
                    <button onclick="addSchedule()" class="py-2 px-5 rounded-xl text-sm font-bold whitespace-nowrap" style="background: var(--accent); color: #fff;">Add</button>
                </div>
                <div class="flex items-center gap-3 flex-wrap">
                    <span class="text-xs font-medium" style="color: var(--text-muted)">Days:</span>
                    <div class="day-checkboxes" id="sched-days">
                        <label><input type="checkbox" value="1" checked>M</label>
                        <label><input type="checkbox" value="2" checked>T</label>
                        <label><input type="checkbox" value="3" checked>W</label>
                        <label><input type="checkbox" value="4" checked>T</label>
                        <label><input type="checkbox" value="5" checked>F</label>
                        <label><input type="checkbox" value="6">S</label>
                        <label><input type="checkbox" value="0">S</label>
                    </div>
                    <button id="sched-quick-daily" onclick="setSchedDays('daily')" class="text-xs px-2 py-1 rounded-lg border font-medium" style="color: var(--text-muted); border-color: var(--border);">Daily</button>
                    <button id="sched-quick-weekdays" onclick="setSchedDays('weekdays')" class="text-xs px-2 py-1 rounded-lg border font-medium" style="background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border);">Weekdays</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Toast -->
    <div id="status-msg" class="fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none"></div>

    <script>
        // ── State ──
        const grid = document.getElementById('host-grid');
        const statusMsg = document.getElementById('status-msg');
        const tableEl = document.getElementById('host-table');
        let hosts = [];
        let rttData = {};       // { uuid: rtt_ms }
        let refreshInterval = null;

        // ── View Mode ──
        function getView() { return localStorage.getItem('opnsense-wol-view') || 'grid'; }
        function setView(mode) {
            localStorage.setItem('opnsense-wol-view', mode);
            document.querySelectorAll('#view-toggle button').forEach(b => {
                b.classList.toggle('active', b.dataset.view === mode);
            });
            grid.classList.toggle('view-table', mode === 'table');
            if (hosts.length > 0) renderHosts();
        }

        // ── Theme ──
        function getTheme() { return localStorage.getItem('opnsense-wol-theme') || 'slate'; }
        function setTheme(name) {
            localStorage.setItem('opnsense-wol-theme', name);
            document.documentElement.setAttribute('data-theme', name);
            document.getElementById('theme-select').value = name;
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.setAttribute('data-theme', getTheme());
            document.getElementById('theme-select').value = getTheme();
        });

        // ── Wake History ──
        function getWakeHistory() {
            try { return JSON.parse(localStorage.getItem('opnsense-wol-wake-history') || '{}'); }
            catch { return {}; }
        }
        function recordWake(uuid, descr) {
            const history = getWakeHistory();
            history[uuid] = { descr, time: Date.now() };
            localStorage.setItem('opnsense-wol-wake-history', JSON.stringify(history));
        }
        function getLastWake(uuid) {
            const history = getWakeHistory();
            const entry = history[uuid];
            if (!entry) return null;
            const delta = Date.now() - entry.time;
            if (delta < 60000) return '<1m ago';
            if (delta < 3600000) return `${Math.floor(delta / 60000)}m ago`;
            if (delta < 86400000) return `${Math.floor(delta / 3600000)}h ago`;
            return `${Math.floor(delta / 86400000)}d ago`;
        }

        // ── Sanitize ──
        function esc(text) {
            if (text == null) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ── Load Hosts ──
        async function loadHosts() {
            grid.style.opacity = '0.6';

            try {
                const res = await fetch('/api/hosts');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                hosts = await res.json();

                const now = new Date();
                document.getElementById('last-updated').textContent =
                    `Updated ${now.toLocaleTimeString()}`;

                // Status is embedded in /api/hosts — map to _online for render
                for (const host of hosts) {
                    host._online = host.online === true ? true : (host.online === false ? false : null);
                }

                // Update status indicator
                const onlineCount = hosts.filter(h => h._online === true).length;
                const totalKnown = hosts.filter(h => h._online !== null).length;
                const indicator = document.getElementById('status-indicator');
                if (totalKnown > 0) {
                    indicator.innerHTML = `<span class="w-2 h-2 rounded-full ${onlineCount > 0 ? 'status-online' : ''}" style="background: ${onlineCount > 0 ? 'var(--online)' : 'var(--offline)'}"></span> ${onlineCount}/${totalKnown} online`;
                }
                renderHosts();
                pingHosts();
            } catch (err) {
                console.error(err);
                grid.innerHTML = `
                    <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center p-8 border rounded-3xl"
                        style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                        <p class="font-bold text-lg" style="color: #fca5a5">Connection Failed</p>
                        <p class="text-sm mt-1" style="color: rgba(252, 165, 165, 0.6)">Could not reach OPNsense API.</p>
                    </div>`;
            } finally {
                grid.style.opacity = '1';
            }
        }

        function renderHosts() {
            if (!Array.isArray(hosts) || hosts.length === 0) {
                grid.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20" style="color: var(--text-muted)">No WOL hosts configured in OPNsense.</div>`;
                return;
            }

            // Route to table view when active
            const view = getView();
            if (view === 'table') {
                renderTable();
                return;
            }

            // Sort: online first, then unknown, then offline
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            grid.innerHTML = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const ip = esc(host.ip || '');
                const uuid = esc(host.uuid);
                const lastWake = getLastWake(uuid);

                // Status dot
                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full status-online flex-shrink-0" style="background: var(--online)" title="Online"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background: var(--offline)" title="Offline"></span>`;
                }

                return `
                <div class="fade-in rounded-2xl p-5 border shadow-xl flex flex-col gap-4 transition-colors"
                    style="background: var(--bg-card); border-color: var(--border);"
                    onmouseenter="this.style.borderColor='var(--border-hover)'"
                    onmouseleave="this.style.borderColor='var(--border)'">

                    <!-- Header -->
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col overflow-hidden min-w-0">
                            <div class="flex items-center gap-2">
                                ${statusDot}
                                <h3 class="font-bold text-lg truncate leading-tight" style="color: var(--text-heading)" title="${descr}">${descr}</h3>
                            </div>
                            <div class="flex items-center gap-1.5 text-xs font-medium mt-0.5" style="color: var(--text-muted)">
                                <span class="uppercase tracking-wider font-bold opacity-60">${iface}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Details -->
                    <div class="rounded-lg p-3 border flex flex-col gap-1.5" style="background: var(--bg-card-inner); border-color: var(--border)">
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">MAC</span>
                            <span class="font-mono tracking-wide select-all" style="color: var(--text)">${mac}</span>
                        </div>
                        ${ip ? `<div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">IP</span>
                            <span style="color: var(--text)">${ip}</span>
                        </div>` : ''}
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">Latency</span>
                            <span class="rtt-badge text-xs font-bold ${host._online ? 'rtt-cached' : 'opacity-40'}" data-uuid="${uuid}" style="color: var(--text-muted)">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span>
                        </div>
                        ${lastWake ? `
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">Last Wake</span>
                            <span style="color: var(--text)">${lastWake}</span>
                        </div>` : ''}
                    </div>

                    <!-- Wake Button -->
                    <button data-uuid="${uuid}" data-descr="${descr}"
                        class="mt-auto w-full font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group transform active:scale-[0.98]"
                        style="background: var(--accent); color: #fff;"
                        onmouseenter="this.style.background='var(--accent-hover)'"
                        onmouseleave="this.style.background='var(--accent)'">
                        <span>Wake Host</span>
                    </button>
                </div>
            `}).join('');
        }

        // ── Ping Hosts ──
        async function pingHosts() {
            const onlineHosts = hosts.filter(h => h._online === true && h.ip);
            if (onlineHosts.length === 0) return;

            for (const host of onlineHosts) {
                try {
                    const res = await fetch(`/api/ping/${host.uuid}`);
                    const data = await res.json();
                    if (data.rtt !== undefined) {
                        rttData[host.uuid] = data.rtt;
                    }
                } catch {
                    // silent — ping is best-effort
                }
            }

            // Update DOM with RTTs
            for (const [uuid, rtt] of Object.entries(rttData)) {
                // Card view: find the .rtt-badge element
                const cardBadge = document.querySelector(`.rtt-badge[data-uuid="${uuid}"]`);
                if (cardBadge) {
                    cardBadge.textContent = `${rtt}ms`;
                    cardBadge.className = `rtt-badge text-xs font-bold px-2 py-0.5 rounded-full ${rttColor(rtt)}`;
                }
                // Table view: find the .ping-cell element
                const td = document.querySelector(`.ping-cell[data-uuid="${uuid}"]`);
                if (td) {
                    td.textContent = `${rtt}ms`;
                    td.className = `ping-cell text-xs font-bold ${rttColor(rtt)}`;
                }
            }
        }

        function rttColor(rtt) {
            if (rtt < 50) return 'text-green-400';
            if (rtt < 150) return 'text-yellow-400';
            return 'text-red-400';
        }

        // ── Render Table ──
        function renderTable() {
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            const rows = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const uuid = esc(host.uuid);
                const ip = esc(host.ip || '');
                const lastWake = getLastWake(uuid);

                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full status-online flex-shrink-0" style="background: var(--online)"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background: var(--offline)"></span>`;
                }

                return `<tr>
                    <td><div class="flex items-center gap-2">${statusDot}<span class="td-name">${descr}</span></div></td>
                    <td><span class="td-iface">${iface}</span></td>
                    <td><span class="td-mac">${mac}</span></td>
                    ${ip ? `<td style="color: var(--text-muted); font-size: 0.75rem;">${ip}</td>` : '<td></td>'}
                    <td><span class="ping-cell text-xs font-bold ${host._online ? 'rtt-cached' : ''}" data-uuid="${uuid}" style="color: var(--text-muted)">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span></td>
                    <td style="color: var(--text-muted); font-size: 0.75rem;">${lastWake || '—'}</td>
                    <td class="td-wake">
                        <button data-uuid="${uuid}" data-descr="${descr}" class="btn-wake-table">Wake</button>
                    </td>
                </tr>`;
            }).join('');

            grid.innerHTML = `
                <div class="col-span-1 sm:col-span-2 lg:col-span-3" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; overflow-x: auto; -webkit-overflow-scrolling: touch;">
                    <table style="min-width: 640px;">
                        <thead>
                            <tr>
                                <th>Host</th>
                                <th>Interface</th>
                                <th>MAC</th>
                                <th>IP</th>
                                <th>Latency</th>
                                <th>Last Wake</th>
                                <th class="td-wake">Action</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        // ── Wake All Hosts ──
        async function wakeAll() {
            const btn = document.getElementById('wake-all-btn');
            const span = btn.querySelector('span');
            const origText = span.textContent;
            btn.disabled = true;
            span.textContent = 'Waking...';

            try {
                const res = await fetch('/api/wake-all', { method: 'POST' });
                const data = await res.json();
                if (res.ok && data.status === 'OK') {
                    // Record wake for all hosts
                    for (const host of hosts) {
                        recordWake(host.uuid, host.descr || 'Unknown');
                    }
                    showToast(`Wake signals sent to ${data.count} hosts!`, 'success');
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast('Failed to send wake signals.', 'error');
                }
            } catch {
                showToast('Network error. Try again.', 'error');
            } finally {
                btn.disabled = false;
                span.textContent = origText;
            }
        }

        // ── Wake Host ──
        grid.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-uuid]');
            if (btn) wakeHost(btn.dataset.uuid, btn.dataset.descr);
        });

        async function wakeHost(uuid, name) {
            showToast(`Sending wake signal to ${name}...`, 'info');
            try {
                const res = await fetch(`/api/wake/${uuid}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok && (data.status === 'OK' || data.result === 'OK')) {
                    recordWake(uuid, name);
                    showToast(`${name} — signal sent!`, 'success');
                    // Re-render to update Last Wake
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast(`Failed to wake ${name}.`, 'error');
                }
            } catch {
                showToast(`Network error waking ${name}.`, 'error');
            }
        }

        // ── Toast ──
        let toastTimer;
        function showToast(msg, type) {
            clearTimeout(toastTimer);
            statusMsg.textContent = msg;

            const colors = {
                success: { bg: 'var(--toast-success)', text: '#6ee7b7', border: 'rgba(52, 211, 153, 0.4)' },
                error:   { bg: 'var(--toast-error)',   text: '#fca5a5', border: 'rgba(239, 68, 68, 0.4)' },
                info:    { bg: 'var(--toast-info)',    text: '#7dd3fc', border: 'rgba(14, 165, 233, 0.4)' }
            };
            const c = colors[type] || colors.info;

            statusMsg.className = 'fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-visible';
            Object.assign(statusMsg.style, {
                background: c.bg, color: c.text, borderColor: c.border
            });

            toastTimer = setTimeout(() => {
                statusMsg.className = 'fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none';
            }, 3500);
        }

        // ── Schedule Management ──
        let schedules = [];

        async function loadSchedules() {
            try {
                const res = await fetch('/api/schedules');
                schedules = await res.json();
                renderSchedules();
            } catch { /* ignore */ }
        }

        function daysLabel(days) {
            if (!days || days.length === 0) return 'Daily';
            const names = {0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
            const isWeekdays = days.length === 5 && [1,2,3,4,5].every(d => days.includes(d));
            if (isWeekdays) return 'Weekdays';
            return days.map(d => names[d] || d).join(', ');
        }

        function timeLabel(t) {
            const [h, m] = t.split(':').map(Number);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
        }

        function renderSchedules() {
            const list = document.getElementById('schedule-list');
            if (!schedules.length) {
                list.innerHTML = '<div class="empty-schedules">No schedules yet. Add one below.</div>';
                return;
            }
            list.innerHTML = schedules.map(s => {
                const isOn = s.enabled !== false;
                return `<div class="schedule-item" data-id="${esc(s.id)}">
                    <div class="sched-info">
                        <div class="sched-host">${esc(s.hostLabel || s.hostUuid)}</div>
                        <div class="sched-detail">${timeLabel(s.time)} &middot; ${daysLabel(s.days)}</div>
                        ${s.lastFired ? `<div class="sched-last">Last fired ${new Date(s.lastFired).toLocaleString()}</div>` : ''}
                    </div>
                    <button class="sched-toggle ${isOn ? 'on' : 'off'}" onclick="toggleSchedule('${esc(s.id)}', ${!isOn})" title="${isOn ? 'Disable' : 'Enable'}"></button>
                    <button class="sched-del" onclick="deleteSchedule('${esc(s.id)}')" title="Delete schedule">&times;</button>
                </div>`;
            }).join('');
        }

        async function addSchedule() {
            const select = document.getElementById('sched-host');
            const hostUuid = select.value;
            const time = document.getElementById('sched-time').value;
            if (!hostUuid || !time) { showToast('Select a host and time.', 'info'); return; }

            // Get host label
            const host = hosts.find(h => h.uuid === hostUuid);
            const hostLabel = host ? (host.descr || host.hostname || 'Unknown') : 'Unknown';

            // Get selected days
            const dayChecks = document.querySelectorAll('#sched-days input[type="checkbox"]:checked');
            const days = Array.from(dayChecks).map(c => parseInt(c.value));
            // If all 7 checked, set to empty for "Daily"
            const finalDays = days.length === 7 ? [] : days;

            try {
                const res = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ hostUuid, hostLabel, time, days: finalDays, label: '' })
                });
                if (res.ok) {
                    await loadSchedules();
                    showToast(`Schedule added for ${hostLabel}.`, 'success');
                } else {
                    showToast('Failed to add schedule.', 'error');
                }
            } catch { showToast('Network error.', 'error'); }
        }

        async function toggleSchedule(id, enable) {
            try {
                await fetch(`/api/schedules/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ enabled: enable })
                });
                await loadSchedules();
            } catch { /* ignore */ }
        }

        async function deleteSchedule(id) {
            try {
                await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
                await loadSchedules();
            } catch { /* ignore */ }
        }

        function setSchedDays(mode) {
            const checks = document.querySelectorAll('#sched-days input[type="checkbox"]');
            const quickBtns = [document.getElementById('sched-quick-daily'), document.getElementById('sched-quick-weekdays')];
            quickBtns.forEach(b => { b.style.background = 'transparent'; b.style.color = 'var(--text-muted)'; b.style.borderColor = 'var(--border)'; });
            if (mode === 'daily') {
                checks.forEach(c => c.checked = true);
                document.getElementById('sched-quick-daily').style.cssText = 'background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);';
            } else {
                checks.forEach(c => c.checked = [1,2,3,4,5].includes(parseInt(c.value)));
                document.getElementById('sched-quick-weekdays').style.cssText = 'background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);';
            }
        }

        function openSchedulesModal() {
            // Populate host dropdown
            const select = document.getElementById('sched-host');
            select.innerHTML = '<option value="">Select host...</option>' +
                hosts.map(h => `<option value="${esc(h.uuid)}">${esc(h.descr || h.hostname || 'Unknown')}</option>`).join('');
            loadSchedules();
            document.getElementById('schedules-modal').classList.add('open');
        }

        function closeSchedulesModal() {
            document.getElementById('schedules-modal').classList.remove('open');
        }

        // ── Init ──
        setView(getView()); // Restore view mode from localStorage
        loadHosts();
        // Auto-refresh host list every 30s
        refreshInterval = setInterval(loadHosts, 30000);
    </script>
</body>
</html>
