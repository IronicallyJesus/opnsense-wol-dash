<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPNsense WOL v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── Theme System ── */
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-inner: #0f172a;
            --border: #334155;
            --border-hover: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-heading: #f8fafc;
            --accent: #0ea5e9;
            --accent-bg: rgba(14, 165, 233, 0.1);
            --accent-border: rgba(14, 165, 233, 0.2);
            --accent-hover: #0284c7;
            --icon-bg: rgba(51, 65, 85, 0.5);
            --icon-border: rgba(71, 85, 105, 0.5);
            --toast-success: rgba(6, 95, 70, 0.9);
            --toast-error: rgba(127, 29, 29, 0.9);
            --toast-info: rgba(30, 41, 59, 0.9);
            --online: #22c55e;
            --offline: #64748b;
            --header-bg: transparent;
        }

        [data-theme="emerald"] {
            --bg: #022c22;
            --bg-card: #064e3b;
            --bg-card-inner: #022c22;
            --border: #065f46;
            --border-hover: #047857;
            --text: #d1fae5;
            --text-muted: #6ee7b7;
            --text-heading: #ecfdf5;
            --accent: #10b981;
            --accent-bg: rgba(16, 185, 129, 0.1);
            --accent-border: rgba(16, 185, 129, 0.2);
            --accent-hover: #059669;
            --icon-bg: rgba(6, 78, 59, 0.5);
            --icon-border: rgba(4, 120, 87, 0.5);
            --online: #34d399;
            --offline: #6b7280;
        }

        [data-theme="violet"] {
            --bg: #1e1b4b;
            --bg-card: #312e81;
            --bg-card-inner: #1e1b4b;
            --border: #4338ca;
            --border-hover: #4f46e5;
            --text: #e0e7ff;
            --text-muted: #a5b4fc;
            --text-heading: #eef2ff;
            --accent: #818cf8;
            --accent-bg: rgba(99, 102, 241, 0.15);
            --accent-border: rgba(99, 102, 241, 0.25);
            --accent-hover: #6366f1;
            --icon-bg: rgba(49, 46, 129, 0.5);
            --icon-border: rgba(67, 56, 202, 0.5);
            --online: #a78bfa;
            --offline: #6b7280;
        }

        [data-theme="rose"] {
            --bg: #1c1917;
            --bg-card: #292524;
            --bg-card-inner: #1c1917;
            --border: #44403c;
            --border-hover: #57534e;
            --text: #fef2f2;
            --text-muted: #fecaca;
            --text-heading: #fff1f2;
            --accent: #f43f5e;
            --accent-bg: rgba(244, 63, 94, 0.1);
            --accent-border: rgba(244, 63, 94, 0.2);
            --accent-hover: #e11d48;
            --icon-bg: rgba(68, 64, 60, 0.5);
            --icon-border: rgba(87, 83, 78, 0.5);
            --online: #34d399;
            --offline: #6b7280;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --bg-card-inner: #f1f5f9;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --text: #334155;
            --text-muted: #64748b;
            --text-heading: #0f172a;
            --accent: #0ea5e9;
            --accent-bg: rgba(14, 165, 233, 0.08);
            --accent-border: rgba(14, 165, 233, 0.15);
            --accent-hover: #0284c7;
            --icon-bg: #f1f5f9;
            --icon-border: #e2e8f0;
            --online: #16a34a;
            --offline: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
        }

        .toast-enter { opacity: 0; transform: translateX(-50%) translateY(20px); }
        .toast-visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Status pulse animation for online hosts */
        .status-online { animation: pulse-green 2s ease-in-out infinite; }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        /* ── Table View ── */
        .view-table.host-grid {
            display: block;
        }
        .view-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .view-table th {
            text-align: left;
            padding: 0.625rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .view-table th:hover { color: var(--text); }
        .view-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            vertical-align: middle;
        }
        .view-table tr:hover td {
            background: var(--bg-card-inner);
        }
        .view-table tr:last-child td { border-bottom: none; }
        .view-table .td-name {
            font-weight: 600;
            color: var(--text-heading);
        }
        .view-table .td-iface {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 0.03em;
        }
        .view-table .td-mac {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .view-table .td-wake {
            text-align: right;
        }
        .view-table .btn-wake-table {
            padding: 0.375rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .view-table .btn-wake-table:hover { background: var(--accent-hover); }
        .view-table .btn-wake-table:active { transform: scale(0.97); }

        /* View toggle button */
        .view-toggle {
            display: inline-flex;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }
        .view-toggle button {
            padding: 0.5rem 0.875rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
        }
        .view-toggle button.active {
            background: var(--accent);
            color: #fff;
        }
        .view-toggle button:not(.active):hover {
            color: var(--text);
            background: var(--bg-card-inner);
        }
        .view-toggle button:first-child { border-right: 1px solid var(--border); }

    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-6xl mt-4 pb-20">
        <!-- Header -->
        <header class="flex flex-wrap justify-between items-center gap-4 mb-10 px-2">
            <div>
                <h1 class="text-3xl font-bold" style="color: var(--text-heading)">Network Wake</h1>
                <p class="text-sm mt-2 ml-1" style="color: var(--text-muted)">Dashboard <span id="version-tag" class="text-xs opacity-60">v3</span></p>
            </div>

            <div class="flex items-center gap-3">
                <!-- Theme Selector -->
                <div class="relative">
                    <select id="theme-select"
                        class="appearance-none py-2.5 pl-4 pr-10 rounded-xl text-sm font-medium cursor-pointer transition-colors"
                        style="background: var(--bg-card); color: var(--text); border: 1px solid var(--border);"
                        onchange="setTheme(this.value)">
                        <option value="slate">Slate Dark</option>
                        <option value="emerald">Emerald Dark</option>
                        <option value="violet">Violet Dark</option>
                        <option value="rose">Rose Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>

                <!-- View Toggle -->
                <div class="view-toggle" id="view-toggle">
                    <button data-view="grid" class="active" onclick="setView('grid')" title="Card grid view">Grid</button>
                    <button data-view="table" onclick="setView('table')" title="Compact table view">Table</button>
                </div>

                <!-- Wake All Button -->
                <button id="wake-all-btn" onclick="wakeAll()" class="py-2.5 px-5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg transform active:scale-[0.98]"
                    style="background: var(--accent); color: #fff;">
                    <span>Wake All</span>
                </button>
            </div>

            <!-- Refresh Button -->
            <button onclick="loadHosts()" class="p-3 rounded-xl transition-colors border shadow-lg"
                style="background: var(--bg-card); color: var(--accent); border-color: var(--border);">
                Refresh
            </button>
        </header>

        <!-- Last Updated + Auto-Refresh indicator -->
        <div class="flex items-center justify-between px-2 mb-6">
            <p class="text-xs" style="color: var(--text-muted)" id="last-updated"></p>
            <p class="text-xs flex items-center gap-1" style="color: var(--text-muted)" id="status-indicator">
                <span class="w-2 h-2 rounded-full" style="background: var(--offline)"></span>
                status idle
            </p>
        </div>

        <!-- Host Container -->
        <div id="host-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 host-grid">
            <div class="col-span-1 md:col-span-2 lg:col-span-3 flex justify-center py-20" style="color: var(--text-muted)">
                Loading...
            </div>
        </div>
    </div>

    <!-- Floating Toast -->
    <div id="status-msg" class="fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none"></div>

    <script>
        // ── State ──
        const grid = document.getElementById('host-grid');
        const statusMsg = document.getElementById('status-msg');
        const tableEl = document.getElementById('host-table');
        let hosts = [];
        let rttData = {};       // { uuid: rtt_ms }
        let refreshInterval = null;

        // ── View Mode ──
        function getView() { return localStorage.getItem('opnsense-wol-view') || 'grid'; }
        function setView(mode) {
            localStorage.setItem('opnsense-wol-view', mode);
            document.querySelectorAll('#view-toggle button').forEach(b => {
                b.classList.toggle('active', b.dataset.view === mode);
            });
            grid.classList.toggle('view-table', mode === 'table');
            if (hosts.length > 0) renderHosts();
        }

        // ── Theme ──
        function getTheme() { return localStorage.getItem('opnsense-wol-theme') || 'slate'; }
        function setTheme(name) {
            localStorage.setItem('opnsense-wol-theme', name);
            document.documentElement.setAttribute('data-theme', name);
            document.getElementById('theme-select').value = name;
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.setAttribute('data-theme', getTheme());
            document.getElementById('theme-select').value = getTheme();
        });

        // ── Wake History ──
        function getWakeHistory() {
            try { return JSON.parse(localStorage.getItem('opnsense-wol-wake-history') || '{}'); }
            catch { return {}; }
        }
        function recordWake(uuid, descr) {
            const history = getWakeHistory();
            history[uuid] = { descr, time: Date.now() };
            localStorage.setItem('opnsense-wol-wake-history', JSON.stringify(history));
        }
        function getLastWake(uuid) {
            const history = getWakeHistory();
            const entry = history[uuid];
            if (!entry) return null;
            const delta = Date.now() - entry.time;
            if (delta < 60000) return '<1m ago';
            if (delta < 3600000) return `${Math.floor(delta / 60000)}m ago`;
            if (delta < 86400000) return `${Math.floor(delta / 3600000)}h ago`;
            return `${Math.floor(delta / 86400000)}d ago`;
        }

        // ── Sanitize ──
        function esc(text) {
            if (text == null) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ── Load Hosts ──
        async function loadHosts() {
            grid.style.opacity = '0.6';

            try {
                const res = await fetch('/api/hosts');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                hosts = await res.json();

                const now = new Date();
                document.getElementById('last-updated').textContent =
                    `Updated ${now.toLocaleTimeString()}`;

                // Status is embedded in /api/hosts — map to _online for render
                for (const host of hosts) {
                    host._online = host.online === true ? true : (host.online === false ? false : null);
                }

                // Update status indicator
                const onlineCount = hosts.filter(h => h._online === true).length;
                const totalKnown = hosts.filter(h => h._online !== null).length;
                const indicator = document.getElementById('status-indicator');
                if (totalKnown > 0) {
                    indicator.innerHTML = `<span class="w-2 h-2 rounded-full ${onlineCount > 0 ? 'status-online' : ''}" style="background: ${onlineCount > 0 ? 'var(--online)' : 'var(--offline)'}"></span> ${onlineCount}/${totalKnown} online`;
                }
                renderHosts();
                pingHosts();
            } catch (err) {
                console.error(err);
                grid.innerHTML = `
                    <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center p-8 border rounded-3xl"
                        style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                        <p class="font-bold text-lg" style="color: #fca5a5">Connection Failed</p>
                        <p class="text-sm mt-1" style="color: rgba(252, 165, 165, 0.6)">Could not reach OPNsense API.</p>
                    </div>`;
            } finally {
                grid.style.opacity = '1';
            }
        }

        function renderHosts() {
            if (!Array.isArray(hosts) || hosts.length === 0) {
                grid.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20" style="color: var(--text-muted)">No WOL hosts configured in OPNsense.</div>`;
                return;
            }

            // Route to table view when active
            const view = getView();
            if (view === 'table') {
                renderTable();
                return;
            }

            // Sort: online first, then unknown, then offline
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            grid.innerHTML = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const uuid = esc(host.uuid);
                const lastWake = getLastWake(uuid);

                // Status dot
                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full status-online flex-shrink-0" style="background: var(--online)" title="Online"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background: var(--offline)" title="Offline"></span>`;
                }

                return `
                <div class="fade-in rounded-2xl p-5 border shadow-xl flex flex-col gap-4 transition-colors"
                    style="background: var(--bg-card); border-color: var(--border);"
                    onmouseenter="this.style.borderColor='var(--border-hover)'"
                    onmouseleave="this.style.borderColor='var(--border)'">

                    <!-- Header -->
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col overflow-hidden min-w-0">
                            <div class="flex items-center gap-2">
                                ${statusDot}
                                <h3 class="font-bold text-lg truncate leading-tight" style="color: var(--text-heading)" title="${descr}">${descr}</h3>
                            </div>
                            <div class="flex items-center gap-1.5 text-xs font-medium mt-0.5" style="color: var(--text-muted)">
                                <span class="uppercase tracking-wider font-bold opacity-60">${iface}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Details -->
                    <div class="rounded-lg p-3 border flex flex-col gap-1.5" style="background: var(--bg-card-inner); border-color: var(--border)">
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">MAC</span>
                            <span class="font-mono tracking-wide select-all" style="color: var(--text)">${mac}</span>
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">Latency</span>
                            <span class="rtt-badge text-xs font-bold ${host._online ? 'rtt-cached' : 'opacity-40'}" data-uuid="${uuid}" style="color: var(--text-muted)">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span>
                        </div>
                        ${lastWake ? `
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium" style="color: var(--text-muted)">Last Wake</span>
                            <span style="color: var(--text)">${lastWake}</span>
                        </div>` : ''}
                    </div>

                    <!-- Wake Button -->
                    <button data-uuid="${uuid}" data-descr="${descr}"
                        class="mt-auto w-full font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group transform active:scale-[0.98]"
                        style="background: var(--accent); color: #fff;"
                        onmouseenter="this.style.background='var(--accent-hover)'"
                        onmouseleave="this.style.background='var(--accent)'">
                        <span>Wake Host</span>
                    </button>
                </div>
            `}).join('');
        }

        // ── Ping Hosts ──
        async function pingHosts() {
            const onlineHosts = hosts.filter(h => h._online === true && h.ip);
            if (onlineHosts.length === 0) return;

            for (const host of onlineHosts) {
                try {
                    const res = await fetch(`/api/ping/${host.uuid}`);
                    const data = await res.json();
                    if (data.rtt !== undefined) {
                        rttData[host.uuid] = data.rtt;
                    }
                } catch {
                    // silent — ping is best-effort
                }
            }

            // Update DOM with RTTs
            for (const [uuid, rtt] of Object.entries(rttData)) {
                // Card view: find the .rtt-badge element
                const cardBadge = document.querySelector(`.rtt-badge[data-uuid="${uuid}"]`);
                if (cardBadge) {
                    cardBadge.textContent = `${rtt}ms`;
                    cardBadge.className = `rtt-badge text-xs font-bold px-2 py-0.5 rounded-full ${rttColor(rtt)}`;
                }
                // Table view: find the .ping-cell element
                const td = document.querySelector(`.ping-cell[data-uuid="${uuid}"]`);
                if (td) {
                    td.textContent = `${rtt}ms`;
                    td.className = `ping-cell text-xs font-bold ${rttColor(rtt)}`;
                }
            }
        }

        function rttColor(rtt) {
            if (rtt < 50) return 'text-green-400';
            if (rtt < 150) return 'text-yellow-400';
            return 'text-red-400';
        }

        // ── Render Table ──
        function renderTable() {
            const sorted = [...hosts].sort((a, b) => {
                const order = { true: 0, null: 1, false: 2 };
                return (order[a._online] ?? 1) - (order[b._online] ?? 1);
            });

            const rows = sorted.map(host => {
                const descr = esc(host.descr || 'Unknown Host');
                const iface = esc(host.friendly_interface || host.interface || host['%interface'] || 'Unknown');
                const mac = esc((host.mac || '').toUpperCase());
                const uuid = esc(host.uuid);
                const ip = esc(host.ip || '');
                const lastWake = getLastWake(uuid);

                let statusDot = '';
                if (host._online === true) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full status-online flex-shrink-0" style="background: var(--online)"></span>`;
                } else if (host._online === false) {
                    statusDot = `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background: var(--offline)"></span>`;
                }

                return `<tr>
                    <td><div class="flex items-center gap-2">${statusDot}<span class="td-name">${descr}</span></div></td>
                    <td><span class="td-iface">${iface}</span></td>
                    <td><span class="td-mac">${mac}</span></td>
                    ${ip ? `<td style="color: var(--text-muted); font-size: 0.75rem;">${ip}</td>` : '<td></td>'}
                    <td><span class="ping-cell text-xs font-bold ${host._online ? 'rtt-cached' : ''}" data-uuid="${uuid}" style="color: var(--text-muted)">${host._online ? (rttData[uuid] ? `${rttData[uuid]}ms` : '—') : 'offline'}</span></td>
                    <td style="color: var(--text-muted); font-size: 0.75rem;">${lastWake || '—'}</td>
                    <td class="td-wake">
                        <button data-uuid="${uuid}" data-descr="${descr}" class="btn-wake-table">Wake</button>
                    </td>
                </tr>`;
            }).join('');

            grid.innerHTML = `
                <div class="col-span-1 sm:col-span-2 lg:col-span-3" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden;">
                    <table>
                        <thead>
                            <tr>
                                <th>Host</th>
                                <th>Interface</th>
                                <th>MAC</th>
                                <th>IP</th>
                                <th>Latency</th>
                                <th>Last Wake</th>
                                <th class="td-wake">Action</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        // ── Wake All Hosts ──
        async function wakeAll() {
            const btn = document.getElementById('wake-all-btn');
            const span = btn.querySelector('span');
            const origText = span.textContent;
            btn.disabled = true;
            span.textContent = 'Waking...';

            try {
                const res = await fetch('/api/wake-all', { method: 'POST' });
                const data = await res.json();
                if (res.ok && data.status === 'OK') {
                    // Record wake for all hosts
                    for (const host of hosts) {
                        recordWake(host.uuid, host.descr || 'Unknown');
                    }
                    showToast(`Wake signals sent to ${data.count} hosts!`, 'success');
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast('Failed to send wake signals.', 'error');
                }
            } catch {
                showToast('Network error. Try again.', 'error');
            } finally {
                btn.disabled = false;
                span.textContent = origText;
            }
        }

        // ── Wake Host ──
        grid.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-uuid]');
            if (btn) wakeHost(btn.dataset.uuid, btn.dataset.descr);
        });

        async function wakeHost(uuid, name) {
            showToast(`Sending wake signal to ${name}...`, 'info');
            try {
                const res = await fetch(`/api/wake/${uuid}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok && (data.status === 'OK' || data.result === 'OK')) {
                    recordWake(uuid, name);
                    showToast(`${name} — signal sent!`, 'success');
                    // Re-render to update Last Wake
                    setTimeout(() => loadHosts(), 500);
                } else {
                    showToast(`Failed to wake ${name}.`, 'error');
                }
            } catch {
                showToast(`Network error waking ${name}.`, 'error');
            }
        }

        // ── Toast ──
        let toastTimer;
        function showToast(msg, type) {
            clearTimeout(toastTimer);
            statusMsg.textContent = msg;

            const colors = {
                success: { bg: 'var(--toast-success)', text: '#6ee7b7', border: 'rgba(52, 211, 153, 0.4)' },
                error:   { bg: 'var(--toast-error)',   text: '#fca5a5', border: 'rgba(239, 68, 68, 0.4)' },
                info:    { bg: 'var(--toast-info)',    text: '#7dd3fc', border: 'rgba(14, 165, 233, 0.4)' }
            };
            const c = colors[type] || colors.info;

            statusMsg.className = 'fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-visible';
            Object.assign(statusMsg.style, {
                background: c.bg, color: c.text, borderColor: c.border
            });

            toastTimer = setTimeout(() => {
                statusMsg.className = 'fixed bottom-8 left-1/2 z-50 min-w-[320px] max-w-[90%] p-4 rounded-xl shadow-2xl text-center text-sm font-bold border backdrop-blur-xl transition-all duration-300 toast-enter pointer-events-none';
            }, 3500);
        }

        // ── Init ──
        setView(getView()); // Restore view mode from localStorage
        loadHosts();
        // Auto-refresh host list every 30s
        refreshInterval = setInterval(loadHosts, 30000);
    </script>
</body>
</html>
