name: Deploy to Dockge

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "Docker Compose service name"
      stacks_dir:
        required: false
        type: string
        default: "/opt/stacks/web-stack"
        description: "Path to docker compose project directory on remote host"
      dockge_container:
        required: false
        type: string
        default: "dockge-dockge-1"
        description: "Dockge container name for docker exec (bypasses .env permissions)"
    secrets:
      REMOTE_HOST:
        required: true
      REMOTE_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true

jobs:
  deploy:
    runs-on: runner-latest
    steps:
      - name: Pull and restart ${{ inputs.service_name }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec ${{ inputs.dockge_container }} sh -c 'cd ${{ inputs.stacks_dir }} && docker compose pull ${{ inputs.service_name }} && docker compose up -d --no-deps --remove-orphans ${{ inputs.service_name }}'
