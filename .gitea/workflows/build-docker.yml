name: Build and Push Docker Image
run-name: Build and Push Docker Image for ${{ gitea.ref_name }} by @${{ gitea.actor }}

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    uses: ./.gitea/workflows/build-image.yml
    secrets: inherit
  deploy-main:
    needs: build
    uses: ./.gitea/workflows/dockge-deploy.yml
    with:
      service_name: opnsense-wol
      stacks_dir: /opt/stacks/opnsense-wol
    secrets: inherit
  deploy-demo:
    needs: build
    uses: ./.gitea/workflows/dockge-deploy.yml
    with:
      service_name: opnsense-wol-demo
      stacks_dir: /opt/stacks/opnsense-wol
    secrets: inherit
