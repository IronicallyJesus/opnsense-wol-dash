name: Build and Push Docker Image
run-name: Build and Push Docker Image for ${{ gitea.ref_name }} by @${{ gitea.actor }}
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-deploy:
    uses: twk95/actions/.gitea/workflows/build-and-deploy.yml@main
    with:
      service_name: opnsense-wol
    secrets: inherit

  deploy-demo:
    needs: build-and-deploy
    runs-on: runner-latest
    steps:
      - name: Deploy demo service via Dockge
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec dockge-dockge-1 sh -c 'cd /opt/stacks/web-stack && docker compose pull opnsense-wol-demo && docker compose up -d --no-deps --remove-orphans opnsense-wol-demo'
