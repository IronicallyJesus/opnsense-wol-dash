services:
  opnsense-wol:
    build: .
    container_name: opnsense-wol
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DEMO_MODE=true
      # Production settings (uncomment and set):
      # - OPNSENSE_URL=https://192.168.1.1
      # - OPNSENSE_API_KEY=your_api_key
      # - OPNSENSE_API_SECRET=your_api_secret
      # - VERIFY_SSL=false
      # - HOST_IPS={"Office Desktop":"192.168.1.100","NAS":"192.168.1.200"}
      # - INTERFACE_MAP={"opt3":"IoT VLAN","vlan0x0a":"VLAN 10 - Devices"}
    restart: unless-stopped
